<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Biblioteca</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="pantalla-auth">
    <div class="caja-registro">
        <h2>Crear Cuenta</h2>
        <div id="caja-mensajes" class="alerta"></div>
        <form id="formulario-registro">
            <div class="grupo-datos">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" required placeholder="Juan Perez">
            </div>
            <div class="grupo-datos">
                <label for="email">Correo Electronico</label>
                <input type="email" id="email" required placeholder="juan@ejemplo.com">
            </div>
            <div class="grupo-datos">
                <label for="clave">Clave de Acceso</label>
                <input type="password" id="clave" required placeholder="Minimo 6 caracteres">
            </div>
            <button type="submit">Registrarse</button>
        </form>
        <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesion aqui</a></p>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>

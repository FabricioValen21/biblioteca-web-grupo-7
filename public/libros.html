<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalogo de Libros</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f4f6f9;
      color: #222;
    }

    header {
      background: #0056b3;
      color: white;
      padding: 16px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    .usuario-info {
      font-size: 14px;
    }

    .contenedor {
      max-width: 1100px;
      margin: 25px auto;
      padding: 0 20px;
    }

    .tarjeta {
      background: white;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    }

    h2 {
      margin-top: 0;
      color: #333;
    }

    .fila {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      flex: 1;
      min-width: 180px;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-azul {
      background: #0056b3;
      color: white;
    }

    .btn-verde {
      background: #28a745;
      color: white;
    }

    .btn-rojo {
      background: #dc3545;
      color: white;
    }

    .btn-gris {
      background: #6c757d;
      color: white;
    }

    .btn-amarillo {
      background: #ffc107;
      color: #222;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #e9ecef;
    }

    .acciones {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .mensaje {
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 15px;
      display: none;
    }

    .ok {
      background: #d4edda;
      color: #155724;
    }

    .error {
      background: #f8d7da;
      color: #721c24;
    }

    .oculto {
      display: none;
    }

    a {
      color: white;
      margin-left: 15px;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <header>
    <div>
      <h1>Biblioteca Web Grupo 7</h1>
      <div class="usuario-info" id="datos-usuario"></div>
    </div>

    <div>
      <a href="prestamos.html">Prestamos</a>
      <button class="btn-rojo" onclick="cerrarSesion()">Cerrar sesion</button>
    </div>
  </header>

  <main class="contenedor">

    <div id="mensaje" class="mensaje"></div>

    <section class="tarjeta">
      <h2>Catalogo de libros</h2>

      <div class="fila">
        <input type="text" id="buscar-titulo" placeholder="Buscar por titulo">
        <button class="btn-azul" onclick="buscarLibros()">Buscar</button>
        <button class="btn-gris" onclick="cargarLibros()">Mostrar todos</button>
      </div>
    </section>

    <section class="tarjeta oculto" id="panel-admin">
      <h2>Agregar libro</h2>

      <div class="fila">
        <input type="text" id="titulo" placeholder="Titulo">
        <input type="text" id="autor" placeholder="Autor">
        <input type="text" id="categoria" placeholder="Categoria">
        <input type="number" id="cantidad" placeholder="Cantidad" min="0">
        <button class="btn-verde" onclick="crearLibro()">Guardar</button>
      </div>
    </section>

    <section class="tarjeta">
      <h2>Lista de libros</h2>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Titulo</th>
            <th>Autor</th>
            <th>Categoria</th>
            <th>Cantidad</th>
            <th>Acciones</th>
          </tr>
        </thead>

        <tbody id="tabla-libros">
          <!-- Aqui se cargan los libros -->
        </tbody>
      </table>
    </section>

  </main>

  <script src="js/libros.js"></script>
</body>
</html>

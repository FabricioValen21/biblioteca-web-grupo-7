<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesion - Biblioteca</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="pantalla-auth">
    <div class="caja-ingreso">
        <h2>Biblioteca Grupo 7</h2>
        <div id="caja-mensajes" class="alerta alerta-mala"></div>
        <form id="formulario-ingreso">
            <div class="grupo-datos">
                <label for="email">Correo Electronico</label>
                <input type="email" id="email" required placeholder="correo@ejemplo.com">
            </div>
            <div class="grupo-datos">
                <label for="clave">Clave de Acceso</label>
                <input type="password" id="clave" required placeholder="********">
            </div>
            <button type="submit">Ingresar</button>
        </form>
        <p>¿No tienes cuenta? <a href="registro.html">Registrate aqui</a></p>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>

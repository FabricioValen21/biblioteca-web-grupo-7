<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - Biblioteca</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header>
    <div>
      <h1>Gestión de Usuarios</h1>
      <div class="usuario-info" id="datos-usuario"></div>
    </div>

    <div>
      <a href="libros.html">Catalogo</a>
      <a href="prestamos.html">Prestamos</a>
      <button class="btn-rojo" onclick="cerrarSesion()">Cerrar sesion</button>
    </div>
  </header>

  <main class="contenedor">
    <div id="mensaje" class="mensaje"></div>

    <section class="tarjeta">
      <h2>Usuarios registrados</h2>
      <button class="btn-azul" onclick="cargarUsuarios()">Actualizar lista</button>
    </section>

    <section class="tarjeta">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Email</th>
            <th>Rol</th>
            <th>Fecha creación</th>
            <th>Acciones</th>
          </tr>
        </thead>

        <tbody id="tabla-usuarios">
          <!-- Aqui se cargan los usuarios -->
        </tbody>
      </table>
    </section>
  </main>

  <script src="js/usuarios.js"></script>
</body>
</html>

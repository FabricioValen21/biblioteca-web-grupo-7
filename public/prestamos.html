<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prestamos - Biblioteca</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header>
    <div>
      <h1>Prestamos de Biblioteca</h1>
      <div class="usuario-info" id="datos-usuario"></div>
    </div>

    <div>
        <a href="prestamos.html">Prestamos</a>
        <a href="usuarios.html" id="link-usuarios">Usuarios</a>
        <button class="btn-rojo" onclick="cerrarSesion()">Cerrar sesion</button>
    </div>
  </header>

  <main class="contenedor">

    <div id="mensaje" class="mensaje"></div>

    <section class="tarjeta">
      <h2>Lista de prestamos</h2>
      <button class="btn-azul" onclick="cargarPrestamos()">Actualizar lista</button>
    </section>

    <section class="tarjeta">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Codigo</th>
            <th>Usuario</th>
            <th>Libro</th>
            <th>Fecha prestamo</th>
            <th>Fecha devolucion</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>

        <tbody id="tabla-prestamos">
          <!-- Aqui se cargan los prestamos -->
        </tbody>
      </table>
    </section>

  </main>

  <script src="js/prestamos.js"></script>
</body>
</html>
